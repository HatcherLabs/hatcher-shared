name: Publish to GitHub Packages

on:
  push:
    branches: [main]

concurrency:
  group: publish-shared
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hatcherlabs'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.mjs || (echo "dist/index.mjs missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

      - name: Auto-bump patch version if already published
        run: |
          CURRENT=$(node -p 'require("./package.json").version')
          if npm view "@hatcherlabs/shared@${CURRENT}" version --registry=https://npm.pkg.github.com 2>/dev/null | grep -q "${CURRENT}"; then
            npm version patch --no-git-tag-version
            NEW=$(node -p 'require("./package.json").version')
            echo "Bumped ${CURRENT} → ${NEW}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: auto-bump shared to ${NEW} [skip ci]"
            git push
          else
            echo "Version ${CURRENT} not yet published — using as-is"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger downstream deploys
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: HatcherLabs/Hatcher
          event-type: shared-updated
          client-payload: '{"version": "${{ steps.pkg.outputs.version }}"}'
        continue-on-error: true
