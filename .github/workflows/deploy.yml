name: Deploy - Shared Package

on:
  push:
    branches: [main]

concurrency:
  group: deploy-shared
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            SHARED_DIR="/home/deploy/hatcher/packages/shared"

            echo "==> Pulling latest shared package..."
            cd "$SHARED_DIR"
            git pull origin main

            echo "==> Installing shared package dependencies..."
            npm ci --ignore-scripts

            echo "==> Building @hatcher/shared..."
            npm run build

            echo "==> Verifying build output..."
            if [ ! -f "$SHARED_DIR/dist/index.js" ]; then
              echo "ERROR: dist/index.js not found after build" >&2
              exit 1
            fi

            echo "==> Updating @hatcher/shared in api-repo..."
            cd /home/deploy/hatcher/apps/api-repo
            npm install @hatcher/shared@latest --registry=https://npm.pkg.github.com
            
            echo "==> Updating @hatcher/shared in frontend..."
            cd /home/deploy/hatcher/apps/frontend
            npm install @hatcher/shared@latest --registry=https://npm.pkg.github.com

            echo "==> Restarting PM2 services..."
            pm2 restart hatcher-api
            pm2 restart hatcher-web
            pm2 restart hatcher-docs
            pm2 restart hatcher-llm-proxy

            echo "==> Health checks..."
            sleep 3
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API health check passed"
            else
              echo "WARNING: API health check failed"
              pm2 logs hatcher-api --lines 20 --nostream
            fi
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend health check passed"
            else
              echo "WARNING: Frontend health check failed"
            fi

            echo "==> Deploy complete at $(date '+%Y-%m-%d %H:%M:%S')"
            echo "$(date '+%Y-%m-%d %H:%M:%S') | shared | $(git rev-parse --short HEAD) | $(git log -1 --pretty=%s)" >> /home/deploy/hatcher/logs/deploys.log
